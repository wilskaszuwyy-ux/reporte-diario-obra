<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Reporte Diario de Obra</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
          colors: {
            ink: "#172033",
            muted: "#667085",
            navy: "#12395b",
            field: "#f7f9fc"
          }
        }
      }
    };
  </script>
  <!--
  GOOGLE APPS SCRIPT DE REFERENCIA

  const SHEETS = {
    cabecera: "Registros_Cabecera",
    actividades: "Registros_Actividades",
    recursos: "Registros_Recursos"
  };

  function doPost(e) {
    const payload = JSON.parse(e.postData.contents);
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const cab = getSheet_(ss, SHEETS.cabecera, [
      "timestamp", "fecha", "responsable", "turno", "clima_manana", "clima_tarde",
      "horas_efectivas", "personal_total", "accidentes", "inspecciones_seguridad",
      "detalle_inspecciones", "conflictos", "trabajos_siguiente_dia", "observaciones"
    ]);
    const act = getSheet_(ss, SHEETS.actividades, [
      "timestamp", "fecha", "responsable", "id_wbs", "nombre", "unidad",
      "meta_dia", "cantidad_ejecutada", "avance_estimado", "observacion"
    ]);
    const rec = getSheet_(ss, SHEETS.recursos, [
      "timestamp", "fecha", "responsable", "tipo", "id_recurso", "descripcion",
      "categoria", "unidad", "cantidad", "wbs"
    ]);

    const ts = new Date();
    cab.appendRow([
      ts, payload.fecha, payload.responsable, payload.turno, payload.clima_manana,
      payload.clima_tarde, payload.horas_efectivas, payload.personal_total,
      payload.accidentes, payload.inspecciones_seguridad, payload.detalle_inspecciones,
      payload.conflictos, payload.trabajos_siguiente_dia, payload.observaciones
    ]);

    (payload.actividades || []).forEach(a => act.appendRow([
      ts, payload.fecha, payload.responsable, a.id_wbs, a.nombre, a.unidad,
      a.meta_dia, a.cantidad_ejecutada, a.avance_estimado, a.observacion
    ]));

    ["mano_obra", "materiales", "equipos"].forEach(tipo => {
      (payload[tipo] || []).forEach(r => rec.appendRow([
        ts, payload.fecha, payload.responsable, tipo, r.id_recurso, r.descripcion,
        r.categoria || r.tipo || "", r.unidad || "", r.cantidad, r.wbs
      ]));
    });

    return ContentService.createTextOutput(JSON.stringify({ ok: true }))
      .setMimeType(ContentService.MimeType.JSON);
  }

  function getSheet_(ss, name, headers) {
    let sheet = ss.getSheetByName(name);
    if (!sheet) sheet = ss.insertSheet(name);
    if (sheet.getLastRow() === 0) {
      sheet.appendRow(headers);
      sheet.getRange(1, 1, 1, headers.length)
        .setFontWeight("bold").setBackground("#12395b").setFontColor("#ffffff");
      sheet.setFrozenRows(1);
    }
    return sheet;
  }
  -->
</head>
<body class="bg-slate-900 text-ink font-sans">
  <div class="app-shell min-h-screen">
    <header class="sticky top-0 z-40 border-b border-slate-200 bg-white/95 backdrop-blur">
      <div class="mx-auto max-w-5xl px-4 py-3">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-3">
            <div class="grid h-11 w-11 place-items-center rounded-lg bg-navy text-white shadow-sm">
              <i class="fa-solid fa-helmet-safety text-lg"></i>
            </div>
            <div>
              <h1 class="text-lg font-extrabold leading-tight sm:text-xl">Reporte Diario de Obra</h1>
              <p id="projectName" class="text-xs font-semibold text-muted">Proyecto Edificación</p>
            </div>
          </div>
          <button id="reloadDataBtn" class="rounded-lg bg-slate-900 px-3 py-2 text-sm font-bold text-white active:scale-[0.99]">
            <i class="fa-solid fa-rotate mr-1"></i> Bases
          </button>
        </div>
        <div class="mt-3 h-2 overflow-hidden rounded-full bg-slate-200">
          <div id="progressBar" class="h-full w-0 rounded-full bg-emerald-500 transition-all"></div>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-5xl px-4 pb-40 pt-4">
      <section class="mb-4 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <div class="mb-3 flex items-center justify-between gap-3">
          <h2 class="text-base font-extrabold text-navy">Cabecera del reporte</h2>
          <div id="dataBadges" class="flex flex-wrap justify-end gap-1.5"></div>
        </div>
        <div class="grid gap-3 grid-cols-2">
          <div>
            <label class="mb-1 block text-sm font-bold" for="fecha">Fecha</label>
            <input id="fecha" type="date" class="field" required>
            <p id="fechaWarning" class="mt-1 hidden text-xs font-bold text-amber-700">La fecha no puede ser futura.</p>
          </div>
          <div>
            <label class="mb-1 block text-sm font-bold" for="responsable">Responsable / Ingeniero</label>
            <input id="responsable" list="responsablesList" type="text" class="field" placeholder="Nombre completo">
            <datalist id="responsablesList"></datalist>
          </div>
          <div>
            <label class="mb-1 block text-sm font-bold" for="turno">Turno</label>
            <select id="turno" class="field">
              <option>Mañana</option>
              <option>Tarde</option>
              <option>Noche</option>
              <option>Continuo</option>
            </select>
          </div>
          <div>
            <label class="mb-1 block text-sm font-bold" for="horas_efectivas">Horas efectivas</label>
            <input id="horas_efectivas" type="number" min="0" step="0.5" class="field" placeholder="8.5">
          </div>
          <div>
            <label class="mb-1 block text-sm font-bold" for="clima_manana">Clima mañana</label>
            <select id="clima_manana" class="field">
              <option>Soleado</option>
              <option>Nublado</option>
              <option>Lluvia</option>
              <option>Viento</option>
            </select>
          </div>
          <div>
            <label class="mb-1 block text-sm font-bold" for="clima_tarde">Clima tarde</label>
            <select id="clima_tarde" class="field">
              <option>Soleado</option>
              <option>Nublado</option>
              <option>Lluvia</option>
              <option>Viento</option>
            </select>
          </div>
          <div class="col-span-2">
            <label class="mb-1 block text-sm font-bold text-slate-700">Tipo de Reporte *</label>
            <div class="grid grid-cols-2 gap-2 rounded-xl bg-slate-100 p-1">
              <button id="btnTypeProd" type="button" class="rounded-lg py-2.5 text-sm font-extrabold text-center transition-all bg-blue-600 text-white shadow-sm">
                🏗️ Producción (EDT/WBS)
              </button>
              <button id="btnTypeSafety" type="button" class="rounded-lg py-2.5 text-sm font-extrabold text-center transition-all text-slate-600 hover:bg-slate-200/50">
                🛡️ Seguridad y Sitio (HSE)
              </button>
            </div>
            <input type="hidden" id="reportType" value="production">
          </div>
          <div id="globalChapterContainer" class="col-span-2">
            <label class="mb-1 block text-sm font-bold text-blue-700" for="globalChapter">Capítulo / EDT del Reporte *</label>
            <select id="globalChapter" class="field border-blue-300 font-extrabold text-blue-900" required>
              <option value="">Seleccione el Capítulo para este Reporte</option>
            </select>
            <p class="mt-1.5 rounded-lg border border-blue-100 bg-blue-50 px-3 py-2 text-xs font-semibold leading-relaxed text-blue-800">
              💡 <strong>Nota:</strong> Cada reporte diario corresponde a un único Capítulo del EDT/WBS. Si supervisa frentes de diferentes capítulos, envíe reportes independientes.
            </p>
          </div>
        </div>
      </section>

      <section class="space-y-3">
        <article id="activitiesAccordion" class="accordion rounded-xl border border-slate-200 bg-white shadow-sm" data-open="true">
          <button class="accordion-toggle flex w-full items-center justify-between px-4 py-4 text-left">
            <span class="font-extrabold text-navy"><i class="fa-solid fa-list-check mr-2"></i>Actividades ejecutadas - EV</span>
            <i class="fa-solid fa-chevron-down transition"></i>
          </button>
          <div class="accordion-body px-4 pb-4">
            <div id="activitiesList" class="space-y-3"></div>
            <button id="addActivityBtn" class="add-btn mt-3" type="button"><i class="fa-solid fa-plus mr-2"></i>Agregar actividad</button>
          </div>
        </article>

        <article id="laborAccordion" class="accordion rounded-xl border border-slate-200 bg-white shadow-sm">
          <button class="accordion-toggle flex w-full items-center justify-between px-4 py-4 text-left">
            <span class="font-extrabold text-navy"><i class="fa-solid fa-people-group mr-2"></i>Personal de mano de obra - AC</span>
            <i class="fa-solid fa-chevron-down transition"></i>
          </button>
          <div class="accordion-body hidden px-4 pb-4">
            <div id="laborList" class="space-y-3"></div>
            <button id="addLaborBtn" class="add-btn mt-3" type="button"><i class="fa-solid fa-plus mr-2"></i>Agregar personal</button>
          </div>
        </article>

        <article id="materialsAccordion" class="accordion rounded-xl border border-slate-200 bg-white shadow-sm">
          <button class="accordion-toggle flex w-full items-center justify-between px-4 py-4 text-left">
            <span class="font-extrabold text-navy"><i class="fa-solid fa-boxes-stacked mr-2"></i>Materiales consumidos - AC</span>
            <i class="fa-solid fa-chevron-down transition"></i>
          </button>
          <div class="accordion-body hidden px-4 pb-4">
            <div id="materialsList" class="space-y-3"></div>
            <button id="addMaterialBtn" class="add-btn mt-3" type="button"><i class="fa-solid fa-plus mr-2"></i>Agregar material</button>
          </div>
        </article>

        <article id="equipmentAccordion" class="accordion rounded-xl border border-slate-200 bg-white shadow-sm">
          <button class="accordion-toggle flex w-full items-center justify-between px-4 py-4 text-left">
            <span class="font-extrabold text-navy"><i class="fa-solid fa-truck-pickup mr-2"></i>Equipos utilizados - AC</span>
            <i class="fa-solid fa-chevron-down transition"></i>
          </button>
          <div class="accordion-body hidden px-4 pb-4">
            <div id="equipmentList" class="space-y-3"></div>
            <button id="addEquipmentBtn" class="add-btn mt-3" type="button"><i class="fa-solid fa-plus mr-2"></i>Agregar equipo</button>
          </div>
        </article>

        <article id="safetyAccordion" class="accordion rounded-xl border border-slate-200 bg-white shadow-sm">
          <button class="accordion-toggle flex w-full items-center justify-between px-4 py-4 text-left">
            <span class="font-extrabold text-navy"><i class="fa-solid fa-shield-halved mr-2"></i>Control y seguridad</span>
            <i class="fa-solid fa-chevron-down transition"></i>
          </button>
          <div class="accordion-body hidden px-4 pb-4">
            <div class="grid gap-3 sm:grid-cols-2">
              <div>
                <label class="mb-1 block text-sm font-bold" for="personal_total">Personal total en obra</label>
                <input id="personal_total" type="number" min="0" class="field">
              </div>
              <label class="flex min-h-[48px] items-center gap-3 rounded-lg border border-slate-200 bg-field px-3 py-2 text-sm font-bold">
                <input id="inspecciones_seguridad" type="checkbox" class="h-5 w-5 accent-emerald-600">
                Inspecciones de seguridad realizadas
              </label>
              <div class="sm:col-span-2">
                <label class="mb-1 block text-sm font-bold" for="detalle_inspecciones">Detalle de inspecciones</label>
                <textarea id="detalle_inspecciones" class="field min-h-24" placeholder="Breve detalle"></textarea>
              </div>
              <div class="sm:col-span-2">
                <label class="mb-1 block text-sm font-bold" for="accidentes">Accidentes / incidentes</label>
                <textarea id="accidentes" class="field min-h-24" placeholder="Ninguno"></textarea>
              </div>
            </div>
          </div>
        </article>

        <article id="issuesAccordion" class="accordion rounded-xl border border-slate-200 bg-white shadow-sm">
          <button class="accordion-toggle flex w-full items-center justify-between px-4 py-4 text-left">
            <span class="font-extrabold text-navy"><i class="fa-solid fa-triangle-exclamation mr-2"></i>Problemas y conflictos</span>
            <i class="fa-solid fa-chevron-down transition"></i>
          </button>
          <div class="accordion-body hidden px-4 pb-4">
            <div class="grid gap-3">
              <div>
                <label class="mb-1 block text-sm font-bold" for="conflictos">Conflictos / restricciones</label>
                <textarea id="conflictos" class="field min-h-24" placeholder="Falta de agua, permisos, interferencias, aprobaciones pendientes"></textarea>
              </div>
              <div>
                <label class="mb-1 block text-sm font-bold" for="trabajos_siguiente_dia">Trabajos para el día siguiente</label>
                <textarea id="trabajos_siguiente_dia" class="field min-h-24" placeholder="Plan breve del día siguiente"></textarea>
              </div>
              <div>
                <label class="mb-1 block text-sm font-bold" for="observaciones">Otras observaciones generales</label>
                <textarea id="observaciones" class="field min-h-24"></textarea>
              </div>
            </div>
          </div>
        </article>
      </section>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 z-40 border-t border-slate-200 bg-white/95 p-3 shadow-[0_-10px_30px_rgba(15,23,42,0.12)] backdrop-blur">
      <div class="mx-auto grid max-w-5xl gap-2 sm:grid-cols-3">
        <button id="saveDraftBtn" class="footer-btn bg-slate-700 hover:bg-slate-800" type="button"><i class="fa-solid fa-floppy-disk mr-2"></i>Guardar</button>
        <button id="downloadXlsxBtn" class="footer-btn bg-blue-700 hover:bg-blue-800" type="button"><i class="fa-solid fa-file-arrow-down mr-2"></i>Descargar XLSX</button>
        <button id="sendBtn" class="footer-btn bg-emerald-600 hover:bg-emerald-700" type="button"><i class="fa-solid fa-cloud-arrow-up mr-2"></i>Enviar</button>
        <button id="clearBtn" class="footer-btn bg-red-50 text-red-700 hover:bg-red-100 sm:col-span-3" type="button"><i class="fa-solid fa-trash mr-2"></i>Limpiar formulario</button>
      </div>
    </footer>
  </div>

  <div id="toast" class="pointer-events-none fixed left-1/2 top-4 z-50 hidden w-[calc(100%-2rem)] max-w-md -translate-x-1/2 rounded-xl px-4 py-3 text-sm font-bold text-white shadow-lg"></div>
  <div id="spinner" class="fixed inset-0 z-50 hidden place-items-center bg-slate-950/55">
    <div class="rounded-xl bg-white p-5 text-center shadow-xl">
      <i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-700"></i>
      <p class="mt-3 text-sm font-extrabold">Enviando reporte...</p>
    </div>
  </div>

  <template id="activityTemplate">
    <div class="row-card rounded-xl border border-slate-200 bg-field p-3 shadow-sm" data-kind="activity">
      <div class="grid gap-3 lg:grid-cols-[1.8fr_0.6fr_0.6fr_0.6fr_1.5fr_auto]">
        <div>
          <label class="row-label">Actividad</label>
          <select class="field activity-select" disabled>
            <option value="">Seleccione el Capítulo en la cabecera primero</option>
          </select>
        </div>
        <div>
          <label class="row-label">Meta día</label>
          <input class="field meta-dia bg-slate-100" readonly value="—">
        </div>
        <div>
          <label class="row-label">Cantidad hoy</label>
          <input class="field qty" type="number" step="0.01" placeholder="0.00">
        </div>
        <div>
          <label class="row-label">Avance estimado</label>
          <input class="field avance bg-slate-100" readonly value="0%">
        </div>
        <div>
          <label class="row-label">Observación</label>
          <input class="field obs" type="text" placeholder="Comentario corto">
        </div>
        <button class="delete-btn self-end" type="button" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
      </div>
      <p class="warning mt-2 hidden rounded-lg bg-amber-100 px-3 py-2 text-xs font-bold text-amber-800">Cantidad supera el metrado total programado.</p>
    </div>
  </template>

  <template id="resourceTemplate">
    <div class="row-card rounded-xl border border-slate-200 bg-field p-3 shadow-sm" data-kind="resource">
      <div class="grid gap-3 lg:grid-cols-[1.8fr_0.4fr_0.6fr_auto]">
        <div>
          <label class="row-label resource-label">Recurso</label>
          <select class="field resource-select"></select>
        </div>
        <div>
          <label class="row-label">Unidad</label>
          <input class="field unit-indicator bg-slate-100 font-bold text-center" readonly value="—">
        </div>
        <div>
          <label class="row-label">Cantidad</label>
          <input class="field qty" type="number" step="0.01" placeholder="0.00">
        </div>
        <button class="delete-btn self-end" type="button" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>
  </template>

  <style>

      min-height: 46px;
      border-radius: 0.5rem;

      min-height: 52px;

  <script>
    const CONFIG = {
      PROJECT_NAME: "Proyecto Edificación",
      DATA_PATH: "./data/",
      GAS_WEBAPP_URL: "https://script.google.com/macros/s/AKfycbw2P7OnxXQnwgXi0y-KiSrsRBdhH25YthoZqNhBLP9QsB5dm02zSARC79nQd-Ov3MXq/exec",
      ENABLE_PV_META: true
    };

    const MASTER_FILES = {
      edt: "BD_EDT.xlsx",
      pv: "BD_Metrados_Planificados.xlsx",
      rrhh: "BD_RRHH.xlsx",
      almacen: "BD_Almacen.xlsx"
    };

    const STORAGE_KEYS = {
      edt: "rdo_edt",
      pv: "rdo_metrados_planificados",
      rrhh: "rdo_rrhh",
      almacen: "rdo_almacen",
      historial: "rdo_historial",
      draft: "rdo_borrador",
      responsables: "rdo_responsables_historial"
    };

    const state = {
      masters: { edt: [], pv: [], rrhh: [], almacen: [] },
      savingTimer: null
    };

    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

    document.addEventListener("DOMContentLoaded", init);

    function init() {
      $("#projectName").textContent = CONFIG.PROJECT_NAME;
      $("#fecha").valueAsDate = new Date();
      loadMastersFromStorage();
      setReportType("production");
      loadDraft();
      renderResponsibleHistory();
      renderBadges();
      wireEvents();
      refreshAllSelects();
      if ($("#activitiesList").children.length === 0) addActivityRow();
      updateProgress();
      autoLoadMasters();
      setInterval(saveDraftSilently, 30000);
    }

    function wireEvents() {
      $$(".accordion-toggle").forEach(button => {
        button.addEventListener("click", () => {
          const acc = button.closest(".accordion");
          const body = $(".accordion-body", acc);
          const icon = $(".fa-chevron-down", button);
          body.classList.toggle("hidden");
          icon.classList.toggle("rotate-180");
        });
      });

      $("#btnTypeProd").addEventListener("click", () => setReportType("production"));
      $("#btnTypeSafety").addEventListener("click", () => setReportType("safety"));

      $("#reloadDataBtn").addEventListener("click", autoLoadMasters);
      $("#addActivityBtn").addEventListener("click", addActivityRow);
      $("#addLaborBtn").addEventListener("click", () => addResourceRow("labor"));
      $("#addMaterialBtn").addEventListener("click", () => addResourceRow("material"));
      $("#addEquipmentBtn").addEventListener("click", () => addResourceRow("equipment"));
      $("#saveDraftBtn").addEventListener("click", () => { saveDraft(); showToast("Borrador guardado.", "ok"); });
      $("#downloadXlsxBtn").addEventListener("click", downloadReportXlsx);

    async function autoLoadMasters() {
      const loaded = {};
      for (const [key, file] of Object.entries(MASTER_FILES)) {
        try {
          const response = await fetchMasterFile(file);
          if (!response.ok) throw new Error("No disponible");
          const blob = await response.blob();
          state.masters[key] = await parseDataFile(blob, file);
          loaded[key] = true;
        } catch (error) {
          loaded[key] = false;
        }
      }
      saveMastersToStorage();
      renderBadges();
      refreshAllSelects();
      if (Object.values(loaded).some(Boolean)) showToast("Bases de datos actualizadas.", "ok");
    }

    async function fetchMasterFile(file) {
      const candidates = [
        `${CONFIG.DATA_PATH}${file}`,
        `./${file}`
      ];

      for (const url of candidates) {
        try {
          const response = await fetch(url, { cache: "no-store" });
          if (response.ok) return response;
        } catch (error) {
          // En file:// algunos navegadores bloquean fetch local; se mantiene carga manual como respaldo.
        }
      }

      return new Response("", { status: 404 });
    }

    async function handleManualFiles(event) {
      const files = Array.from(event.target.files || []);
      for (const file of files) {
        const key = identifyMasterKey(file.name);
        if (!key) continue;
        state.masters[key] = await parseDataFile(file, file.name);
      }
      saveMastersToStorage();
      renderBadges();
      refreshAllSelects();
      showToast("Bases cargadas manualmente.", "ok");
      event.target.value = "";
    }

    function identifyMasterKey(name) {
      const lower = name.toLowerCase();
      if (lower.includes("edt") || lower.includes("wbs")) return "edt";
      if (lower.includes("pv") || lower.includes("planificado")) return "pv";
      if (lower.includes("rrhh") || lower.includes("recurso")) return "rrhh";
      if (lower.includes("almacen") || lower.includes("material") || lower.includes("equipo")) return "almacen";
      return "";
    }

    async function parseDataFile(fileOrBlob, filename) {
      const lower = filename.toLowerCase();
      if (lower.endsWith(".csv")) {
        return parseCsvText(await fileOrBlob.text()).map(normalizeRow);
      }
      const workbook = XLSX.read(await fileOrBlob.arrayBuffer(), { type: "array", cellDates: true });
      const sheetName = workbook.SheetNames.includes("Sheet1") ? "Sheet1" : workbook.SheetNames[0];
      return XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: "" }).map(normalizeRow);
    }

    function parseCsvText(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(cell);
          if (row.some(value => value !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if (cell || row.length) {
        row.push(cell);
        if (row.some(value => value !== "")) rows.push(row);
      }

      const headers = (rows.shift() || []).map(header => header.trim());
      return rows.map(values => {
        const out = {};
        headers.forEach((header, index) => {
          out[header] = values[index] === undefined ? "" : values[index].trim();
        });
        return out;
      });
    }

    function normalizeRow(row) {
      const out = {};
      for (const [key, value] of Object.entries(row)) {
        const cleanKey = String(key).trim().replace(/^["']|["']$/g, '');
        out[cleanKey] = value instanceof Date ? toDateInputValue(value) : value;
      }

      // Auto-normalize WBS identifiers based on the user's corrected Excel format
      if (out.nivel_wbs !== undefined) {
        const level = Number(out.nivel_wbs);
        if (level === 1) {
          out.id_wbs = String(out.edt_id || "").trim();
          out.nombre_actividad = String(out.edt_nombre || "").trim();
        } else if (level === 2) {
          out.id_wbs = String(out.actividad_id || "").trim();
          out.nombre_actividad = String(out.actividad_nombre || "").trim();
        }
      }
      return out;
    }

    function renderBadges() {
      const labels = { edt: "EDT", pv: "Metrados", rrhh: "RRHH", almacen: "Almacén" };
      $("#dataBadges").innerHTML = Object.entries(labels).map(([key, label]) => {

    function addActivityRow(data = {}) {
      const node = $("#activityTemplate").content.firstElementChild.cloneNode(true);
      $("#activitiesList").appendChild(node);

      const activitySelect = $(".activity-select", node);
      const globalChapterVal = $("#globalChapter").value;

      if (!globalChapterVal) {
        activitySelect.innerHTML = `<option value="">Seleccione el Capítulo en la cabecera primero</option>`;
        activitySelect.disabled = true;
      } else {
        activitySelect.disabled = false;
        fillActivitySelectFiltered(activitySelect, globalChapterVal, data.id_wbs);
      }

      activitySelect.addEventListener("change", () => {
        updateActivityRow(node);
        queueDraftSave();
      });

      $(".qty", node).addEventListener("input", () => {
        updateActivityRow(node);
        queueDraftSave();
      });

      $(".delete-btn", node).addEventListener("click", () => {
        node.remove();
        validateResourceSections();
        updateProgress();
        queueDraftSave();
      });

      $(".obs", node).value = data.observacion || "";

      updateProgress();

      const node = $("#resourceTemplate").content.firstElementChild.cloneNode(true);
      node.dataset.resourceKind = kind;
      const label = { labor: "Personal", material: "Material", equipment: "Equipo" }[kind];
      $(".resource-label", node).textContent = label;
      
      const target = kind === "labor" ? "#laborList" : kind === "material" ? "#materialsList" : "#equipmentList";
      $(target).appendChild(node);
      
      const select = $(".resource-select", node);
      fillResourceSelect(select, kind, data.id_recurso);

        const id = select.value;
        const master = kind === "labor" ? state.masters.rrhh : state.masters.almacen;
        const resource = master.find(item => String(item.id_recurso) === String(id)) || {};

      };

        updateUnitIndicator();
        updateProgress();
        queueDraftSave();
      });

        queueDraftSave();
      });

        node.remove();
        updateProgress();
        queueDraftSave();

    function fillActivitySelectFiltered(select, chapterId, selected = "") {
      const date = $("#fecha").value;
      const allActivities = getActivitiesForDate(date);
      // Filter activities belonging to this chapter
      const filtered = allActivities.filter(r => {
        const parentId = r.padre_id || r.edt_id || String(r.id_wbs).split(".")[0] + ".0";
        return String(parentId) === String(chapterId);
      });

      select.innerHTML = `<option value="">Seleccione actividad</option>` + filtered.map(row => {
        const id = safe(row.id_wbs);
        const label = `${id} ${safe(row.nombre_actividad)} — Unidad: ${safe(row.unidad)}`;
        return `<option value="${escapeAttr(id)}" ${String(selected) === String(id) ? "selected" : ""}>${label}</option>`;
      }).join("");
    }

    function fillResourceSelect(select, kind, selected = "") {
      let rows = [];
      if (kind === "labor") rows = state.masters.rrhh;
      if (kind === "material") rows = state.masters.almacen.filter(r => String(r.tipo).toLowerCase() === "material");
      if (kind === "equipment") rows = state.masters.almacen.filter(r => String(r.tipo).toLowerCase() === "equipo");
      select.innerHTML = `<option value="">Seleccione recurso</option>` + rows.map(row => {
        const id = safe(row.id_recurso);
        const desc = safe(row.descripcion);
        const detail = kind === "labor" ? safe(row.categoria) : safe(row.tipo);
        const unit = safe(row.unidad || (kind === "labor" ? "H-H" : ""));
        const unitSuffix = unit ? ` [${unit}]` : "";
        return `<option value="${escapeAttr(id)}" ${String(selected) === String(id) ? "selected" : ""}>${id} ${desc} (${detail})${unitSuffix}</option>`;
      }).join("");
    }

    function refreshAllSelects() {
      // Populate globalChapter select in header
      const globalChapterSelect = $("#globalChapter");
      if (globalChapterSelect) {
        const currentGlobalVal = globalChapterSelect.value;
        const chapters = state.masters.edt.filter(row => Number(row.nivel_wbs) === 1);
        globalChapterSelect.innerHTML = `<option value="">Seleccione el Capítulo para este Reporte</option>` + chapters.map(ch => {
          return `<option value="${escapeAttr(ch.id_wbs)}" ${String(currentGlobalVal) === String(ch.id_wbs) ? "selected" : ""}>${ch.id_wbs} ${safe(ch.nombre_actividad || ch.actividad_nombre)}</option>`;
        }).join("");
      }

      refreshActivityOptions();
      $$("#laborList .row-card").forEach(row => fillResourceSelect($(".resource-select", row), "labor", $(".resource-select", row).value));
      $$("#materialsList .row-card").forEach(row => fillResourceSelect($(".resource-select", row), "material", $(".resource-select", row).value));
      $$("#equipmentList .row-card").forEach(row => fillResourceSelect($(".resource-select", row), "equipment", $(".resource-select", row).value));
    }

    function refreshActivityOptions() {
      const globalChapterVal = $("#globalChapter").value;
      $$("#activitiesList .row-card").forEach(row => {
        const activitySelect = $(".activity-select", row);
        const currentActivity = activitySelect.value;

        if (globalChapterVal) {
          activitySelect.disabled = false;
          fillActivitySelectFiltered(activitySelect, globalChapterVal, currentActivity);
        } else {
          activitySelect.innerHTML = `<option value="">Seleccione el Capítulo en la cabecera primero</option>`;
          activitySelect.disabled = true;
        }
      });
    }

    function updateAllActivityRows() {
      $$("#activitiesList .row-card").forEach(updateActivityRow);
    }

    function updateActivityRow(row) {
      const id = $(".activity-select", row).value;
      const qty = Number($(".qty", row).value || 0);
      const total = getActivityMetradoTotal(id);
      const meta = getPvMeta(id, $("#fecha").value);
      $(".meta-dia", row).value = meta === "" ? "—" : meta;
      $(".avance", row).value = total > 0 ? `${((qty / total) * 100).toFixed(2)}%` : "0%";
      $(".warning", row).classList.toggle("hidden", !(total > 0 && qty > total));
    }

    function validateResourceSections() {
      const globalChapterSelect = $("#globalChapter");
      if (globalChapterSelect) {
        const hasRows = $$(".row-card").length > 0;
        globalChapterSelect.classList.toggle("border-red-500", hasRows && !globalChapterSelect.value);
      }
    }

    function validateSoft() {
      const today = toDateInputValue(new Date());
      const future = $("#fecha").value > today;
      $("#fecha").classList.toggle("border-amber-500", future);
      $("#fechaWarning").classList.toggle("hidden", !future);
      $$("#activitiesList .row-card").forEach(updateActivityRow);
      validateResourceSections();
    }

    function getActivitiesForDate(date) {
      // Retornar todas las actividades del catálogo para permitir reportar retrasos o trabajos adelantados
      return getSelectableActivities();
    }

    function getSelectableActivities() {
      return state.masters.edt.filter(row => {
        const isLeaf = Number(row.nivel_wbs) === 2;
        const hasBudget = Number(row.presupuesto_total || 0) > 0;
        return isLeaf && hasBudget;
      });
    }

    function getEdtCostCodes() {
      return state.masters.edt.filter(row => {
        const id = String(row.id_wbs || "").trim();
        return id && id !== "0" && Number(row.nivel_wbs) === 1;
      });
    }

    function getPvMeta(idWbs, date) {
      if (!CONFIG.ENABLE_PV_META || !idWbs || !date) return "";
      const row = state.masters.pv.find(item => String(item.id_wbs) === String(idWbs) && normalizeDateString(item.fecha) === date);
      return row ? row.metrado_diario_planificado : "";
    }

    function getActivityMetradoTotal(idWbs) {
      if (!idWbs) return 0;
      const pvRows = state.masters.pv.filter(item => String(item.id_wbs) === String(idWbs));
      return Math.max(0, ...pvRows.map(item => Number(item.metrado_acumulado_planificado || 0)));
    }

    function collectPayload() {
      const payload = {
        report_type: $("#reportType")?.value || "production",
        fecha: $("#fecha").value,
        responsable: $("#responsable").value.trim(),
        turno: $("#turno").value,
        clima_manana: $("#clima_manana").value,
        clima_tarde: $("#clima_tarde").value,
        horas_efectivas: Number($("#horas_efectivas").value || 0),
        personal_total: Number($("#personal_total").value || 0),
        accidentes: $("#accidentes").value.trim(),
        inspecciones_seguridad: $("#inspecciones_seguridad").checked,
        detalle_inspecciones: $("#detalle_inspecciones").value.trim(),
        conflictos: $("#conflictos").value.trim(),
        trabajos_siguiente_dia: $("#trabajos_siguiente_dia").value.trim(),
        observaciones: $("#observaciones").value.trim(),
        global_edt: getSelectedEdt("#globalChapter"),
        actividades: collectActivities(),
        mano_obra: collectResources("#laborList", "labor", "#globalChapter"),
        materiales: collectResources("#materialsList", "material", "#globalChapter"),
        equipos: collectResources("#equipmentList", "equipment", "#globalChapter")
      };
      return payload;
    }

    function collectActivities() {
      return $$("#activitiesList .row-card").map(row => {
        const id = $(".activity-select", row).value;
        const activity = state.masters.edt.find(item => String(item.id_wbs) === String(id)) || {};
        return {
          id_wbs: id,
          nombre: activity.nombre_actividad || "",
          unidad: activity.unidad || "",
          meta_dia: $(".meta-dia", row).value,
          cantidad_ejecutada: Number($(".qty", row).value || 0),
          avance_estimado: $(".avance", row).value,
          observacion: $(".obs", row).value.trim()
        };
      }).filter(row => row.id_wbs || row.cantidad_ejecutada || row.observacion);
    }

    function collectResources(selector, kind, edtSelector) {
      const selectedEdt = getSelectedEdt(edtSelector);
      return $$(`${selector} .row-card`).map(row => {
        const id = $(".resource-select", row).value;
        const master = kind === "labor" ? state.masters.rrhh : state.masters.almacen;
        const resource = master.find(item => String(item.id_recurso) === String(id)) || {};
        return {
          edt_id: selectedEdt.id_wbs,
          edt_nombre: selectedEdt.nombre_actividad,
          id_recurso: id,
          descripcion: resource.descripcion || "",
          categoria: resource.categoria || "",
          tipo: resource.tipo || "",
          unidad: resource.unidad || "",
          cantidad: Number($(".qty", row).value || 0),
          wbs: selectedEdt.id_wbs
        };
      }).filter(row => row.id_recurso || row.cantidad || row.wbs);
    }

    function getSelectedEdt(selector) {
      const id = $(selector)?.value || "";
      return state.masters.edt.find(row => String(row.id_wbs) === String(id)) || { id_wbs: id, nombre_actividad: "" };
    }

    function saveDraft() {
      const payload = collectPayload();
      localStorage.setItem(STORAGE_KEYS.draft, JSON.stringify(payload));
      saveResponsible(payload.responsable);
    }

    function saveDraftSilently() {
      saveDraft();
    }

    function queueDraftSave() {
      clearTimeout(state.savingTimer);
      state.savingTimer = setTimeout(saveDraftSilently, 500);
    }

    function setReportType(type) {
      const isProd = type === "production";
      const reportTypeInput = $("#reportType");
      if (reportTypeInput) {
        reportTypeInput.value = type;
      }
      
      const btnProd = $("#btnTypeProd");
      const btnSafety = $("#btnTypeSafety");
      
      if (btnProd && btnSafety) {
        if (isProd) {
          btnProd.className = "rounded-lg py-2.5 text-sm font-extrabold text-center transition-all bg-blue-600 text-white shadow-sm";
          btnSafety.className = "rounded-lg py-2.5 text-sm font-extrabold text-center transition-all text-slate-600 hover:bg-slate-200/50";
        } else {
          btnProd.className = "rounded-lg py-2.5 text-sm font-extrabold text-center transition-all text-slate-600 hover:bg-slate-200/50";
          btnSafety.className = "rounded-lg py-2.5 text-sm font-extrabold text-center transition-all bg-emerald-600 text-white shadow-sm";
        }
      }
      
      const chContainer = $("#globalChapterContainer");
      if (chContainer) {
        chContainer.classList.toggle("hidden", !isProd);
      }
      const globalChapterSelect = $("#globalChapter");
      if (globalChapterSelect) {
        globalChapterSelect.required = isProd;
      }
      
      const toggleClass = (id, hidden) => {
        const el = $(id);
        if (el) el.classList.toggle("hidden", hidden);
      };
      
      toggleClass("#activitiesAccordion", !isProd);
      toggleClass("#laborAccordion", !isProd);
      toggleClass("#materialsAccordion", !isProd);
      toggleClass("#equipmentAccordion", !isProd);
      toggleClass("#issuesAccordion", !isProd);
      
      toggleClass("#safetyAccordion", isProd);
      
      if (!isProd) {
        const safetyBody = $("#safetyAccordion .accordion-body");
        if (safetyBody) safetyBody.classList.remove("hidden");
        const safetyIcon = $("#safetyAccordion .fa-chevron-down");
        if (safetyIcon) safetyIcon.classList.add("rotate-180");
      }
      
      updateProgress();
      queueDraftSave();
    }

    function loadDraft() {
      const raw = localStorage.getItem(STORAGE_KEYS.draft);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        setValue("fecha", data.fecha);
        setValue("responsable", data.responsable);
        setValue("turno", data.turno);
        setValue("clima_manana", data.clima_manana);
        setValue("clima_tarde", data.clima_tarde);
        setValue("horas_efectivas", data.horas_efectivas);
        setValue("personal_total", data.personal_total);
        setValue("accidentes", data.accidentes);
        $("#inspecciones_seguridad").checked = Boolean(data.inspecciones_seguridad);
        setValue("detalle_inspecciones", data.detalle_inspecciones);
        setValue("conflictos", data.conflictos);
        setValue("trabajos_siguiente_dia", data.trabajos_siguiente_dia);
        setValue("observaciones", data.observaciones);
        
        setReportType(data.report_type || "production");
        setValue("globalChapter", data.global_edt?.id_wbs || data.mano_obra?.[0]?.edt_id || data.mano_obra?.[0]?.wbs || "");
        
        // Populate activities and resources
        (data.actividades || []).forEach(addActivityRow);
        (data.mano_obra || []).forEach(item => addResourceRow("labor", item));
        (data.materiales || []).forEach(item => addResourceRow("material", item));
        (data.equipos || []).forEach(item => addResourceRow("equipment", item));
      } catch (error) {
        localStorage.removeItem(STORAGE_KEYS.draft);
      }
    }

    function downloadReportXlsx() {
      const payload = collectPayload();
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([{
        fecha: payload.fecha,
        responsable: payload.responsable,
        turno: payload.turno,
        clima_manana: payload.clima_manana,
        clima_tarde: payload.clima_tarde,
        horas_efectivas: payload.horas_efectivas,
        personal_total: payload.personal_total,
        accidentes: payload.accidentes,
        inspecciones_seguridad: payload.inspecciones_seguridad,
        detalle_inspecciones: payload.detalle_inspecciones,
        conflictos: payload.conflictos,
        trabajos_siguiente_dia: payload.trabajos_siguiente_dia,
        observaciones: payload.observaciones
      }]), "Cabecera");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(payload.actividades), "Actividades");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([
        ...payload.mano_obra.map(r => ({ tipo: "mano_obra", ...r })),
        ...payload.materiales.map(r => ({ tipo: "material", ...r })),
        ...payload.equipos.map(r => ({ tipo: "equipo", ...r }))
      ]), "Recursos");
      XLSX.writeFile(wb, `RDO_${payload.fecha || "sin_fecha"}.xlsx`);
      showToast("Reporte XLSX generado.", "ok");
    }

    async function sendToGoogleSheets() {
      const payload = collectPayload();
      if (CONFIG.GAS_WEBAPP_URL.includes("...")) {
        showToast("Configure CONFIG.GAS_WEBAPP_URL antes de enviar.", "error");
        return;
      }
      $("#spinner").classList.remove("hidden");
      $("#spinner").classList.add("grid");
      try {
        await fetch(CONFIG.GAS_WEBAPP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        localStorage.removeItem(STORAGE_KEYS.draft);
        saveResponsible(payload.responsable);
        resetForm();
        showToast("Reporte enviado correctamente.", "ok");
      } catch (error) {
        showToast("No se pudo enviar a Google Sheets.", "error");
      } finally {
        $("#spinner").classList.add("hidden");
        $("#spinner").classList.remove("grid");
      }
    }

    function clearForm() {
      if (!confirm("¿Desea limpiar todo el formulario y borrar el borrador local?")) return;
      localStorage.removeItem(STORAGE_KEYS.draft);
      resetForm();
      showToast("Formulario limpio.", "ok");
    }

       ["globalChapter", "responsable", "horas_efectivas", "personal_total", "accidentes", "detalle_inspecciones", "conflictos", "trabajos_siguiente_dia", "observaciones"].forEach(id => setValue(id, ""));

       $("#materialsList").innerHTML = "";
       $("#equipmentList").innerHTML = "";
       
       setReportType("production");
       addActivityRow();
       updateProgress();
     }

     function updateProgress() {
       const isProd = $("#reportType")?.value === "production";
       let fields = [];
       if (isProd) {
         fields = [
           $("#globalChapter")?.value,
           $("#fecha").value,
           $("#responsable").value,
           $("#turno").value,
           $("#horas_efectivas").value,
           collectActivities().length,
           collectResources("#laborList", "labor", "#globalChapter").length,
           $("#conflictos").value || $("#trabajos_siguiente_dia").value || $("#observaciones").value
         ];
       } else {
         fields = [
           $("#fecha").value,
           $("#responsable").value,
           $("#turno").value,
           $("#personal_total").value,
           $("#accidentes").value || $("#detalle_inspecciones").value || $("#observaciones").value
         ];
       }
       const completed = fields.filter(Boolean).length;
       $("#progressBar").style.width = `${Math.round((completed / fields.length) * 100)}%`;
     }

    function saveMastersToStorage() {
      localStorage.setItem(STORAGE_KEYS.edt, JSON.stringify(state.masters.edt));
      localStorage.setItem(STORAGE_KEYS.pv, JSON.stringify(state.masters.pv));
      localStorage.setItem(STORAGE_KEYS.rrhh, JSON.stringify(state.masters.rrhh));
      localStorage.setItem(STORAGE_KEYS.almacen, JSON.stringify(state.masters.almacen));
    }

    function loadMastersFromStorage() {
      for (const key of ["edt", "pv", "rrhh", "almacen"]) {
        const raw = localStorage.getItem(STORAGE_KEYS[key]);
        if (!raw) continue;
        try {
          state.masters[key] = JSON.parse(raw);
        } catch (error) {
          localStorage.removeItem(STORAGE_KEYS[key]);
        }
      }
    }

    function saveResponsible(name) {
      if (!name) return;
      const list = JSON.parse(localStorage.getItem(STORAGE_KEYS.responsables) || "[]");
      const next = [name, ...list.filter(item => item !== name)].slice(0, 12);
      localStorage.setItem(STORAGE_KEYS.responsables, JSON.stringify(next));
      renderResponsibleHistory();
    }

    function renderResponsibleHistory() {
      const list = JSON.parse(localStorage.getItem(STORAGE_KEYS.responsables) || "[]");
      $("#responsablesList").innerHTML = list.map(name => `<option value="${escapeAttr(name)}"></option>`).join("");
    }

    function showToast(message, type) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.className = `fixed left-1/2 top-4 z-50 w-[calc(100%-2rem)] max-w-md -translate-x-1/2 rounded-xl px-4 py-3 text-sm font-bold text-white shadow-lg ${type === "error" ? "bg-red-700" : "bg-emerald-700"}`;
      toast.classList.remove("hidden");
      setTimeout(() => toast.classList.add("hidden"), 2800);
    }

    function setValue(id, value) {
      if (value !== undefined && value !== null) $(`#${id}`).value = value;
    }

    function normalizeDateString(value) {
      if (!value) return "";
      if (value instanceof Date) return toDateInputValue(value);
      const text = String(value).trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;
      const date = new Date(text);
      return Number.isNaN(date.getTime()) ? "" : toDateInputValue(date);
    }

    function toDateInputValue(date) {
      const local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 10);
    }

    function safe(value) {
      return value === undefined || value === null ? "" : String(value);
    }

    function escapeAttr(value) {
      return safe(value).replaceAll("&", "&amp;").replaceAll('"', "&quot;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }
  </script>
</body>
</html>
